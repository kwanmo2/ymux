name: release

# Build the Windows installer and publish it to GitHub Releases.
#
# Triggers:
#   - Pushing a tag matching `v*` (e.g. `v0.1.0`) — the normal release path.
#   - Manual `workflow_dispatch` from the Actions UI for ad-hoc test builds.
#
# The actual build runs on `windows-latest` because the Tauri runtime, ConPTY,
# WebView2 bootstrapper, and NSIS bundler are all Windows-only. The pure-logic
# Rust crate (ymux_lib) is also unit-tested on a Linux runner first so a
# broken commit fails fast before the slow Windows build starts.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to use for the release (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0-test'
      draft:
        description: 'Publish as a draft release?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  test-linux:
    name: Test (linux, lib only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt (workspace)
        run: cargo fmt --all --check

      - name: cargo clippy (workspace, no tauri deps)
        run: cargo clippy -p ytheme -p yipc -p ymon -p ydir -p ycode -p ylauncher -- -D warnings

      - name: cargo clippy (ymux lib, no tauri runtime)
        run: cargo clippy --no-default-features --lib --tests -p ymux -- -D warnings

      - name: cargo test (tools + shared crates)
        run: cargo test -p ytheme -p yipc -p ymon -p ydir -p ycode -p ylauncher

      - name: cargo test (ymux lib, no tauri runtime)
        run: cargo test --no-default-features --lib -p ymux

      # Install the Tauri 2 system dependencies on Linux so we can `cargo
      # check` the `ymux` binary with `--features desktop` enabled. This
      # catches command-handler / generate_handler! regressions on a fast
      # Linux runner before the slower windows-latest job ever spins up.
      - name: Install Tauri Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            pkg-config

      - name: Create dummy sidecar binaries for cargo check
        run: |
          mkdir -p src-tauri/binaries
          TRIPLE=$(rustc -vV | grep host | cut -d' ' -f2)
          for tool in ymon ydir ycode y ygit; do
            touch "src-tauri/binaries/${tool}-${TRIPLE}"
          done

      - name: cargo check --bin (with desktop feature)
        run: cargo check --features desktop --bin ymux -p ymux

  build-windows:
    name: Build (windows, tauri)
    needs: test-linux
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "draft=${{ inputs.draft }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & release with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.meta.outputs.tag }}
          releaseName: 'ymux ${{ steps.meta.outputs.tag }}'
          # Minimal placeholder — the `Rewrite release body…` step below
          # replaces this with install info + GitHub's auto-generated
          # notes (PRs & commits since the previous tag).
          releaseBody: 'ymux ${{ steps.meta.outputs.tag }} — Windows build. Release notes are being generated…'
          releaseDraft: ${{ steps.meta.outputs.draft == 'true' }}
          prerelease: false

      # Replace the placeholder body with install instructions plus the
      # GitHub "Generate release notes" output (groups merged PRs and
      # commits since the previous tag). If the API call fails — e.g. the
      # very first release where there is no previous tag — we fall back
      # to just the install section so the release is never left with
      # the placeholder text.
      - name: Rewrite release body with auto-generated notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          AUTO=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/releases/generate-notes" \
            -f tag_name="$TAG" \
            --jq .body 2>/dev/null || echo "")

          {
            echo "ymux ${TAG} — Windows build."
            echo ""
            echo "## Install"
            echo ""
            echo "Download \`ymux_*_x64_en-US.msi\` below and run it."
            echo "The installer bundles a WebView2 bootstrapper, so Windows 10"
            echo "machines without the runtime will install it on first launch."
            if [ -n "$AUTO" ]; then
              echo ""
              echo "$AUTO"
            fi
            echo ""
            echo "See the [README](https://github.com/${REPO}#readme) for keybindings and usage."
          } > release-notes.md

          gh release edit "$TAG" --repo "$REPO" --notes-file release-notes.md
